<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Giỏ hàng</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; }

    .cart {
      width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }

    .item img { width: 80px; }

    .qty button {
      padding: 5px 10px;
      cursor: pointer;
    }

    .remove {
      color: red;
      cursor: pointer;
    }

    .total {
      font-size: 22px;
      color: red;
      text-align: right;
      margin-top: 20px;
    }
  </style>

</head>
<body>

<div class="cart">
  <h1>🛒 Giỏ hàng</h1>

  <div id="cart-list"></div>

  <div class="total" id="total"></div>
</div>

<script>

  function renderCart(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let html = "";
    let total = 0;

    cart.forEach((item, index) => {

      html += `
        <div class="item">
            <img src="${item.img}">

            <div style="flex:1">
                <h3>${item.name}</h3>
                <p>${item.price}đ</p>
            </div>

            <div class="qty">
                <button onclick="changeQty(${index}, -1)">-</button>
                ${item.quantity}
                <button onclick="changeQty(${index}, 1)">+</button>
            </div>

            <div class="remove" onclick="removeItem(${index})">
                Xóa
            </div>
        </div>
        `;

      total += item.price * item.quantity;
    });

    document.getElementById("cart-list").innerHTML = html;
    document.getElementById("total").innerText = "Tổng: " + total + "đ";
  }

  // tăng giảm số lượng
  function changeQty(index, change){

    let cart = JSON.parse(localStorage.getItem("cart"));

    cart[index].quantity += change;

    if(cart[index].quantity <= 0){
      cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  // xóa sản phẩm
  function removeItem(index){

    let cart = JSON.parse(localStorage.getItem("cart"));

    cart.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  renderCart();

</script>

</body>
</html>
